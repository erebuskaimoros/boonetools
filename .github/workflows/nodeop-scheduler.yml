name: NodeOp Scheduler

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Supabase nodeop-scheduler
        env:
          NODEOP_SCHEDULER_URL: ${{ secrets.NODEOP_SCHEDULER_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NODEOP_SCHEDULER_SECRET: ${{ secrets.NODEOP_SCHEDULER_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${NODEOP_SCHEDULER_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "Missing required secrets: NODEOP_SCHEDULER_URL and/or SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi

          if ! printf '%s' "${NODEOP_SCHEDULER_URL}" | grep -Eq '^https?://'; then
            echo "Invalid NODEOP_SCHEDULER_URL secret: expected absolute http(s) URL"
            exit 1
          fi

          curl_args=(
            --fail
            --show-error
            --silent
            --connect-timeout 15
            --max-time 120
            --request POST
            --url "${NODEOP_SCHEDULER_URL}"
            --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}"
            --header "Content-Type: application/json"
          )

          if [ -n "${NODEOP_SCHEDULER_SECRET:-}" ]; then
            curl_args+=(--header "x-nodeop-secret: ${NODEOP_SCHEDULER_SECRET}")
          fi

          curl "${curl_args[@]}" | tee /tmp/nodeop-scheduler-response.json

          echo
          echo "Scheduler trigger completed"
